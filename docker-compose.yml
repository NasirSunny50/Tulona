services:
  db:
    image: postgres:16
    container_name: tulona_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tulona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tulona}
      POSTGRES_DB: ${POSTGRES_DB:-tulona}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tulona} -d ${POSTGRES_DB:-tulona}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
